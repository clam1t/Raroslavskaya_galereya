<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Галерея{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('home') }}" class="logo">🎨 Галерея</a>
            <div class="nav-links">
                <a href="{{ url_for('buy_ticket') }}">Купить билет</a>
                <div class="user-info">
                    {% if session.username %}
                        <span class="username">{{ session.username }}</span>
                        <a href="{{ url_for('logout') }}" class="logout-btn">Выйти</a>
                    {% else %}
                        <a href="#" onclick="openAuthModal('login')" class="login-btn">Вход</a>
                        <a href="#" onclick="openAuthModal('register')" class="register-btn">Регистрация</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>

            <!-- Переключатель вкладок -->
            <div class="tab-container">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Регистрация</button>
                <button class="tab-btn" id="passwordResetTab" onclick="switchTab('passwordReset')">Забыл пароль</button>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <h2>Вход в систему</h2>
                <div id="loginError" class="error-message" style="display: none;"></div>
                <div id="loginSuccess" class="success-message" style="display: none;"></div>

                <form onsubmit="submitLogin(event)">
                    <div class="form-group">
                        <label for="login_first_name">Имя:</label>
                        <input type="text" id="login_first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="login_last_name">Фамилия:</label>
                        <input type="text" id="login_last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="login_password">Пароль:</label>
                        <input type="password" id="login_password" name="password" required>
                    </div>

                    <button type="submit" id="loginBtn">Войти</button>
                </form>
            </div>

            <!-- Форма восстановления пароля -->
            <div id="passwordResetForm" class="auth-form">
                <h2>Восстановить пароль</h2>
                <div id="passwordError" class="error-message" style="display: none;"></div>
                <div id="passwordSuccess" class="success-message" style="display: none;"></div>

                <form onsubmit="resetPassword(event)">
                    <div class="form-group">
                        <label for="reset_first_name">Имя:</label>
                        <input type="text" id="reset_first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reset_last_name">Фамилия:</label>
                        <input type="text" id="reset_last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reset_email">Почта:</label>
                        <input type="email" id="reset_email" name="email" required>
                    </div>

                    <button type="submit" id="sendcodeBtn">Прислать пароль</button>
                </form>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form">
                <h2>Регистрация</h2>
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>

                <form onsubmit="submitRegistration(event)">
                    <div class="form-group">
                        <label for="reg_first_name">Имя:</label>
                        <input type="text" id="reg_first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_last_name">Фамилия:</label>
                        <input type="text" id="reg_last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_email">Email:</label>
                        <input type="email" id="reg_email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_password">Пароль:</label>
                        <input type="password" id="reg_password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_confirm_password">Подтвердите пароль:</label>
                        <input type="password" id="reg_confirm_password" name="confirm_password" required>
                    </div>

                    <button type="submit" id="registerBtn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Открыть модальное окно
        function openAuthModal(tab) {
            document.getElementById('authModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            switchTab(tab);
        }

        // Закрыть модальное окно
        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.body.style.overflow = 'auto';

            // Очистить формы
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById('passwordResetForm').reset();

            // Скрыть сообщения
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginSuccess').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('passwordSuccess').style.display = 'none';
        }

        // Переключение между вкладками
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const passwordResetTab = document.getElementById('passwordResetTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const passwordResetForm = document.getElementById('passwordResetForm');

            // Сначала убираем активный класс у всех
            loginTab.classList.remove('active');
            registerTab.classList.remove('active');
            passwordResetTab.classList.remove('active');
            loginForm.classList.remove('active');
            registerForm.classList.remove('active');
            passwordResetForm.classList.remove('active');

            // Добавляем активный класс в зависимости от выбранной вкладки
            if (tab === 'login') {
                loginTab.classList.add('active');
                loginForm.classList.add('active');
            } else if (tab === 'register') {
                registerTab.classList.add('active');
                registerForm.classList.add('active');
            } else if (tab === 'passwordReset') {
                passwordResetTab.classList.add('active');
                passwordResetForm.classList.add('active');
            }
        }

        // Отправка входа
        async function submitLogin(event) {
            event.preventDefault();

            const formData = {
                first_name: document.getElementById('login_first_name').value,
                last_name: document.getElementById('login_last_name').value,
                password: document.getElementById('login_password').value
            };

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Вход...';

            try {
                const response = await fetch('/yar_galery/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('loginSuccess').textContent = 'Вход выполнен! Перенаправление...';
                    document.getElementById('loginSuccess').style.display = 'block';
                    document.getElementById('loginError').style.display = 'none';

                    setTimeout(() => {
                        window.location.href = '/yar_galery/home/';
                    }, 1000);
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Ошибка входа';
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('loginSuccess').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Ошибка соединения с сервером';
                document.getElementById('loginError').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        // Восстановление пароля
        async function resetPassword(event) {
            event.preventDefault();

            const formData = {
                first_name: document.getElementById('reset_first_name').value,
                last_name: document.getElementById('reset_last_name').value,
                email: document.getElementById('reset_email').value
            };

            const btn = document.getElementById('sendcodeBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';

            try {
                const response = await fetch('/yar_galery/resetPassword/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    document.getElementById('passwordSuccess').textContent = 'Пароль отправлен на почту!';
                    document.getElementById('passwordSuccess').style.display = 'block';
                    document.getElementById('passwordError').style.display = 'none';

                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    const data = await response.json();
                    document.getElementById('passwordError').textContent = data.error || 'Ошибка восстановления';
                    document.getElementById('passwordError').style.display = 'block';
                    document.getElementById('passwordSuccess').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('passwordError').textContent = 'Ошибка соединения с сервером';
                document.getElementById('passwordError').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Прислать пароль';
            }
        }

        // Отправка регистрации
        async function submitRegistration(event) {
            event.preventDefault();

            const password = document.getElementById('reg_password').value;
            const confirmPassword = document.getElementById('reg_confirm_password').value;

            if (password !== confirmPassword) {
                document.getElementById('registerError').textContent = 'Пароли не совпадают';
                document.getElementById('registerError').style.display = 'block';
                document.getElementById('registerSuccess').style.display = 'none';
                return;
            }

            const formData = {
                first_name: document.getElementById('reg_first_name').value,
                last_name: document.getElementById('reg_last_name').value,
                email: document.getElementById('reg_email').value,
                password: password,
                confirm_password: confirmPassword
            };

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Регистрация...';

            try {
                const response = await fetch('/yar_galery/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registerSuccess').textContent = 'Регистрация успешна! Вход выполнен.';
                    document.getElementById('registerSuccess').style.display = 'block';
                    document.getElementById('registerError').style.display = 'none';

                    setTimeout(() => {
                        window.location.href = '/yar_galery/home/';
                    }, 1500);
                } else {
                    document.getElementById('registerError').textContent = data.error || 'Ошибка регистрации';
                    document.getElementById('registerError').style.display = 'block';
                    document.getElementById('registerSuccess').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('registerError').textContent = 'Ошибка соединения с сервером';
                document.getElementById('registerError').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        }

        // Закрыть модальное окно при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('authModal');
            if (event.target == modal) {
                closeAuthModal();
            }
        }
    </script>
</body>
</html>
