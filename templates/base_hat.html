<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Галерея{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('home') }}" class="logo">🎨 Галерея</a>
            <div class="nav-links">
                <a href="{{ url_for('buy_ticket') }}">Купить билет</a>
                <div class="user-info">
                    {% if session.username %}
                        <span class="username">{{ session.username }}</span>
                        <a href="{{ url_for('logout') }}" class="logout-btn">Выйти</a>
                    {% else %}
                        <a href="#" onclick="openAuthModal('login')" class="login-btn">Вход</a>
                        <a href="#" onclick="openAuthModal('register')" class="register-btn">Регистрация</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ (ПО УМОЛЧАНИЮ ЗАКРЫТО) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>

            <!-- Переключатель вкладок -->
            <div class="tab-container">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <h2>Вход в систему</h2>
                <div id="loginError" class="error-message" style="display: none;"></div>

                <form onsubmit="submitLogin(event)">
                    <div class="form-group">
                        <label for="login_first_name">Имя:</label>
                        <input type="text" id="login_first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="login_last_name">Фамилия:</label>
                        <input type="text" id="login_last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="login_password">Пароль:</label>
                        <input type="password" id="login_password" name="password" required>
                    </div>

                    <button type="submit" id="loginBtn">Войти</button>
                </form>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form">
                <h2>Регистрация</h2>
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>

                <form onsubmit="submitRegistration(event)">
                    <div class="form-group">
                        <label for="reg_first_name">Имя:</label>
                        <input type="text" id="reg_first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_last_name">Фамилия:</label>
                        <input type="text" id="reg_last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_email">Email:</label>
                        <input type="email" id="reg_email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_password">Пароль:</label>
                        <input type="password" id="reg_password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="reg_confirm_password">Подтвердите пароль:</label>
                        <input type="password" id="reg_confirm_password" name="confirm_password" required>
                    </div>

                    <button type="submit" id="registerBtn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Открыть модальное окно ТОЛЬКО ПРИ КЛИКЕ
        function openAuthModal(tab) {
            document.getElementById('authModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            switchTab(tab);
        }

        // Закрыть модальное окно
        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            // Очистить формы и сообщения
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        }

        // Переключение между вкладками
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        // Отправка входа через JSON
        async function submitLogin(event) {
            event.preventDefault();

            const formData = {
                first_name: document.getElementById('login_first_name').value,
                last_name: document.getElementById('login_last_name').value,
                password: document.getElementById('login_password').value
            };

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Вход...';

            try {
                const response = await fetch('/yar_galery/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showLoginSuccess('Вход выполнен! Перенаправление...');
                    setTimeout(() => {
                        window.location.href = '/yar_galery/home/';
                    }, 1000);
                } else {
                    showLoginError(data.error || 'Ошибка входа');
                }
            } catch (error) {
                showLoginError('Ошибка соединения с сервером');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        // Отправка регистрации через JSON
        async function submitRegistration(event) {
            event.preventDefault();

            const formData = {
                first_name: document.getElementById('reg_first_name').value,
                last_name: document.getElementById('reg_last_name').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_password').value,
                confirm_password: document.getElementById('reg_confirm_password').value
            };

            // Валидация паролей
            if (formData.password !== formData.confirm_password) {
                showRegisterError('Пароли не совпадают');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Регистрация...';

            try {
                const response = await fetch('/yar_galery/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showRegisterSuccess('Регистрация успешна! Вход выполнен автоматически.');
                    setTimeout(() => {
                        window.location.href = '/yar_galery/home/';
                    }, 1500);
                } else {
                    showRegisterError(data.error || 'Ошибка регистрации');
                }
            } catch (error) {
                showRegisterError('Ошибка соединения с сервером');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            errorDiv.style.color = '#721c24';
            errorDiv.style.backgroundColor = '#f8d7da';
        }

        function showLoginSuccess(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            errorDiv.style.color = '#155724';
            errorDiv.style.backgroundColor = '#d4edda';
        }

        function showRegisterError(message) {
            const errorDiv = document.getElementById('registerError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('registerSuccess').style.display = 'none';
        }

        function showRegisterSuccess(message) {
            const successDiv = document.getElementById('registerSuccess');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('registerError').style.display = 'none';
        }

        // Закрыть модальное окно при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('authModal');
            if (event.target == modal) {
                closeAuthModal();
            }
        }
    </script>
</body>
</html>
