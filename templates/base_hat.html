<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Галерея{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('home') }}" class="logo">🎨 Галерея</a>
            <div class="nav-links">
                <a href="{{ url_for('buy_ticket') }}">Купить билет</a>
                <div class="user-info">
                    {% if session.username %}
                        <span class="username">{{ session.username }}</span>
                        <a href="{{ url_for('logout') }}" class="logout-btn">Выйти</a>
                    {% else %}
                         <a href="{{ url_for('login_page') }}" class="login-btn">Вход</a>
                        <a href="{{ url_for('register_page') }}" class="register-btn">Регистрация</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
